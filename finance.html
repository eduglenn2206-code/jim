<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0C0C12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Patron" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<title>Finance · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>
<style>
/* ---- Design tokens ---- */
:root {
  color-scheme: dark;
  --bg:#0C0C12; --bg-elevated:#15151F;
  --surface:rgba(255,255,255,.028); --surface-2:rgba(255,255,255,.055);
  --fg:#F3F2F8; --muted:rgba(243,242,248,.50); --muted-strong:rgba(243,242,248,.74);
  --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.17);
  --brand:#8B7CFF; --brand-2:#C7BBFF; --brand-ink:#130E2E;
  --brand-soft:rgba(139,124,255,.12); --brand-line:rgba(139,124,255,.28); --brand-glow:rgba(139,124,255,.42);
  --pos:#46E0A8; --pos-soft:rgba(70,224,168,.12); --pos-line:rgba(70,224,168,.26);
  --neg:#FB7185; --neg-soft:rgba(251,113,133,.12); --neg-line:rgba(251,113,133,.26);
  --card-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 18px 44px -30px rgba(0,0,0,.85);
  --glow-1:rgba(139,124,255,.12); --glow-2:rgba(70,224,168,.05); --grain-opacity:.05;
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem; --space-16:4rem;
  --radius-sm:8px; --radius-md:11px; --radius-lg:18px; --radius-pill:999px;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(.2,.8,.2,1); --ease-premium:cubic-bezier(.16,1,.3,1); --duration:200ms;
  --font-display:'Space Grotesk'; --font-ui:'Hanken Grotesk'; --font-mono:'JetBrains Mono';
}
[data-theme="aurora"] {
  color-scheme: dark;
  --bg:#080913; --bg-elevated:#12131F;
  --surface:rgba(150,160,255,.045); --surface-2:rgba(150,160,255,.08);
  --fg:#EEF0FF; --muted:rgba(220,225,255,.52); --muted-strong:rgba(220,225,255,.76);
  --border:rgba(150,160,255,.11); --border-strong:rgba(150,160,255,.22);
  --brand:#8B7BFF; --brand-2:#B9ABFF; --brand-ink:#0A0922;
  --brand-soft:rgba(139,123,255,.15); --brand-line:rgba(139,123,255,.32); --brand-glow:rgba(124,107,255,.6);
  --pos:#4FE3D0; --pos-soft:rgba(79,227,208,.13); --pos-line:rgba(79,227,208,.28);
  --neg:#FF6FA5; --neg-soft:rgba(255,111,165,.13); --neg-line:rgba(255,111,165,.28);
  --card-shadow:0 0 0 1px rgba(140,130,255,.05) inset,0 22px 56px -28px rgba(78,60,210,.55);
  --glow-1:rgba(124,107,255,.20); --glow-2:rgba(79,227,208,.13); --grain-opacity:.05;
}
[data-theme="daylight"] {
  color-scheme: light;
  --bg:#F3F2FA; --bg-elevated:#FFFFFF; --surface:#FFFFFF; --surface-2:#FAF9FF;
  --fg:#171622; --muted:rgba(23,22,34,.52); --muted-strong:rgba(23,22,34,.72);
  --border:rgba(23,22,60,.10); --border-strong:rgba(23,22,60,.18);
  --brand:#6A45FF; --brand-2:#8E6BFF; --brand-ink:#FFFFFF;
  --brand-soft:rgba(106,69,255,.08); --brand-line:rgba(106,69,255,.24); --brand-glow:rgba(106,69,255,.28);
  --pos:#0E9E64; --pos-soft:rgba(14,158,100,.10); --pos-line:rgba(14,158,100,.26);
  --neg:#E11D63; --neg-soft:rgba(225,29,99,.08); --neg-line:rgba(225,29,99,.24);
  --card-shadow:0 1px 2px rgba(23,22,60,.05),0 16px 34px -24px rgba(23,22,60,.24);
  --glow-1:rgba(106,69,255,.07); --glow-2:rgba(14,158,100,.04); --grain-opacity:.02;
}

/* ---- Base ---- */
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--text-base);-webkit-font-smoothing:antialiased;transition:background var(--duration) var(--ease)}
@media(max-width:480px){input,select,textarea{font-size:16px !important}}
@supports(padding:max(0px)){body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}}
.grain-overlay{position:relative}
.grain-overlay::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:var(--grain-opacity);mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");background-size:200px 200px}
.page{position:relative;min-height:100dvh;background:var(--bg);color:var(--fg);padding:var(--space-12) var(--space-5) var(--space-16);isolation:isolate}
.page::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(58% 42% at 82% 6%,var(--glow-1),transparent 70%),radial-gradient(48% 38% at 12% 92%,var(--glow-2),transparent 72%)}
.shell{max-width:680px;margin:0 auto;padding-bottom:60px}

/* ---- Header ---- */
.header{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-8);flex-wrap:wrap}
.headerLeft{display:flex;flex-direction:column;gap:var(--space-3)}
.headerRight{display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-2)}
.back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:6px 13px 6px 9px;background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:var(--radius-pill);color:var(--brand);font-size:var(--text-xs);font-weight:600;letter-spacing:.01em;text-decoration:none;transition:background var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium)}
.back:hover{background:color-mix(in srgb,var(--brand) 18%,transparent);border-color:var(--brand)}
.backArrow{font-size:14px;line-height:1}
.title{font-family:var(--font-display);font-weight:600;font-size:var(--text-3xl);line-height:1;letter-spacing:-.03em;color:var(--fg);margin:0}
.subtitle{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin:0}

/* ---- Theme + currency switchers ---- */
.themeSeg,.currencySeg{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px}
.themeBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.02em;padding:5px 11px 5px 8px;border-radius:var(--radius-pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium)}
.themeBtn:hover{color:var(--muted-strong)}
.themeSwatch{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 1px var(--border-strong) inset;flex-shrink:0}
.themeBtnActive,.themeBtnActive:hover{background:var(--brand-soft);color:var(--fg)}
.themeBtnActive .themeSwatch{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--brand)}
.currencyBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.04em;padding:5px 11px;border-radius:var(--radius-pill);cursor:pointer;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium)}
.currencyBtn:hover{color:var(--muted-strong)}
.currencyBtnActive,.currencyBtnActive:hover{background:var(--brand);color:var(--brand-ink)}

/* ---- Section ---- */
.section{margin-bottom:var(--space-10)}
.sectionHead{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-5)}
.sectionTitle{font-family:var(--font-display);font-weight:600;font-size:var(--text-xl);letter-spacing:-.02em;color:var(--fg)}

/* ---- KPI grid ---- */
.kpiGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4)}
@media(max-width:520px){.kpiGrid{grid-template-columns:1fr}}
.kpiCard{padding:var(--space-5);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--card-shadow);cursor:pointer;transition:border-color var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium)}
.kpiCard:hover{border-color:var(--brand-line)}
.kpiCard.editing{cursor:default;border-color:var(--brand-line);box-shadow:0 0 0 3px var(--brand-soft),var(--card-shadow)}
.kpiLabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpiValue{font-family:var(--font-display);font-weight:600;font-size:var(--text-2xl);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
.kpiHint{font-size:10px;color:var(--muted);margin-top:6px}
.kpiInput{width:100%;background:var(--bg-elevated);border:1px solid var(--brand-line);border-radius:var(--radius-md);padding:8px 10px;color:var(--fg);font-family:var(--font-display);font-size:var(--text-xl);font-weight:600;outline:none;font-variant-numeric:tabular-nums}
.kpiInput:focus{box-shadow:0 0 0 3px var(--brand-soft)}

/* ---- Rate badge ---- */
.rateBadge{display:inline-flex;flex-direction:column;align-items:flex-end;gap:2px}
.rateBig{font-family:var(--font-display);font-weight:600;font-size:var(--text-2xl);color:var(--pos);font-variant-numeric:tabular-nums;line-height:1}
.rateSub{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
[data-theme="aurora"] .rateBig{background:linear-gradient(100deg,var(--brand-2) 0%,var(--pos) 120%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

/* ---- Payout card ---- */
.card{padding:var(--space-5);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--card-shadow)}
.payoutForm{display:grid;grid-template-columns:1fr 1fr auto;gap:var(--space-3);align-items:stretch;margin-bottom:var(--space-5)}
@media(max-width:480px){.payoutForm{grid-template-columns:1fr 1fr}.payoutFormBtn{grid-column:span 2}}
.fieldInput{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;color:var(--fg);font-family:var(--font-ui);font-size:var(--text-sm);outline:none;transition:border-color var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium)}
.fieldInput::placeholder{color:var(--muted)}
.fieldInput:focus{border-color:var(--brand-line);box-shadow:0 0 0 3px var(--brand-soft)}
.btn{appearance:none;border:0;border-radius:var(--radius-md);padding:10px 18px;font-family:var(--font-ui);font-size:var(--text-sm);font-weight:700;cursor:pointer;transition:filter var(--duration) var(--ease-premium)}
.btnPrimary{background:var(--brand);color:var(--brand-ink)}
.btnPrimary:hover{filter:brightness(1.08)}

/* ---- Payout list ---- */
.payoutList{display:flex;flex-direction:column;gap:8px}
.payoutRow{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:var(--space-3);padding:11px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md)}
.payoutDate{font-family:var(--font-mono);font-size:11px;color:var(--muted);white-space:nowrap}
.payoutNums{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.pill{font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:var(--radius-pill)}
.pillReceived{background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand-line)}
.pillReinvested{background:var(--pos-soft);color:var(--pos);border:1px solid var(--pos-line)}
.payoutRate{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;color:var(--muted-strong)}
.xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;display:grid;place-items:center;flex-shrink:0}
.xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
.empty{color:var(--muted);font-size:13px;padding:var(--space-3) 0;margin:0}
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell" id="app"></div>
</main>
<script>
const STORE_KEY = 'finance_portfolio_v1';
const CURRENCIES = ['USD','EUR','GBP','CHF'];
const SYMBOLS = {USD:'$',EUR:'€',GBP:'£',CHF:'Fr '};
const THEMES = [
  {key:'nocturne',label:'Nocturne',swatch:'#8B7CFF'},
  {key:'aurora',label:'Aurora',swatch:'linear-gradient(135deg,#8B7BFF,#4FE3D0)'},
  {key:'daylight',label:'Daylight',swatch:'#6A45FF'},
];
let currentTheme = (function(){ try{ return localStorage.getItem('patron_theme')||'nocturne'; }catch(e){ return 'nocturne'; } })();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    const base = {currency:'USD',invested:0,passiveIncome:0,cashBalance:0,payouts:[]};
    return raw ? Object.assign(base, JSON.parse(raw)) : base;
  }catch{ return {currency:'USD',invested:0,passiveIncome:0,cashBalance:0,payouts:[]}; }
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch{} }

let state = load();
let editing = null; // 'invested' | 'passiveIncome' | 'cashBalance'

function sym(){ return SYMBOLS[state.currency] || (state.currency + ' '); }
function fmt(n){ return sym() + (Number(n)||0).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts){ const d=new Date(ts); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate(); }

function reinvestRate(){
  const cutoff = Date.now() - 30*86400000;
  const recent = state.payouts.filter(p => p.ts >= cutoff);
  if(!recent.length) return null;
  const rec = recent.reduce((s,p) => s+(p.received||0), 0);
  const rei = recent.reduce((s,p) => s+(p.reinvested||0), 0);
  return rec > 0 ? (rei/rec)*100 : null;
}

function headerHtml(){
  const themeSegs = THEMES.map(t =>
    '<button type="button" class="themeBtn '+(t.key===currentTheme?'themeBtnActive':'')+'" data-act="theme" data-theme="'+t.key+'">'
    +'<span class="themeSwatch" style="background:'+t.swatch+'"></span>'+t.label+'</button>').join('');
  const currSegs = CURRENCIES.map(c =>
    '<button type="button" class="currencyBtn '+(c===state.currency?'currencyBtnActive':'')+'" data-act="currency" data-c="'+c+'">'+c+'</button>').join('');
  return '<header class="header"><div class="headerLeft">'
    +'<a class="back" href="index.html"><span class="backArrow">←</span> Dashboard</a>'
    +'<h1 class="title">Finance</h1><p class="subtitle">Portfolio · passive income</p>'
    +'</div><div class="headerRight">'
    +'<div class="themeSeg" role="radiogroup" aria-label="Theme">'+themeSegs+'</div>'
    +'<div class="currencySeg" role="radiogroup" aria-label="Currency">'+currSegs+'</div>'
    +'</div></header>';
}

function kpiCardHtml(field, label, value){
  const isEd = editing === field;
  const body = isEd
    ? '<input class="kpiInput" id="kpi-'+field+'" type="number" min="0" step="1" value="'+esc(String(Math.round(Number(value)||0)))+'" data-kpi="'+field+'" />'
    : '<div class="kpiValue">'+esc(fmt(value))+'</div><div class="kpiHint">tap to edit</div>';
  return '<div class="kpiCard'+(isEd?' editing':'')+'" data-field="'+field+'"><div class="kpiLabel">'+esc(label)+'</div>'+body+'</div>';
}

function portfolioHtml(){
  return '<section class="section">'
    +'<div class="sectionHead"><span class="sectionTitle">Portfolio</span></div>'
    +'<div class="kpiGrid">'
    +kpiCardHtml('invested',     'Total Invested',  state.invested)
    +kpiCardHtml('passiveIncome','Monthly Passive',  state.passiveIncome)
    +kpiCardHtml('cashBalance',  'Cash Balance',     state.cashBalance)
    +'</div></section>';
}

function payoutHtml(){
  const rate = reinvestRate();
  const badge = '<div class="rateBadge">'
    +'<span class="rateBig">'+(rate != null ? rate.toFixed(1)+'%' : '<span style="color:var(--muted)">—</span>')+'</span>'
    +'<span class="rateSub">reinvest rate · 30d</span></div>';

  const form = '<div class="payoutForm">'
    +'<input class="fieldInput" id="p-rec" type="number" min="0" step="0.01" placeholder="Received" inputmode="decimal" />'
    +'<input class="fieldInput" id="p-rei" type="number" min="0" step="0.01" placeholder="Reinvested" inputmode="decimal" />'
    +'<button class="btn btnPrimary payoutFormBtn" id="logBtn">Log</button>'
    +'</div>';

  const last3 = state.payouts.slice().reverse().slice(0,3);
  const listRows = last3.length
    ? last3.map((p,i) => {
        const origIdx = state.payouts.length - 1 - i;
        const r = p.received > 0 ? Math.round((p.reinvested/p.received)*100)+'%' : '—';
        return '<div class="payoutRow">'
          +'<span class="payoutDate">'+fmtDate(p.ts)+'</span>'
          +'<div class="payoutNums">'
          +'<span class="pill pillReceived">'+esc(fmt(p.received))+'</span>'
          +'<span class="pill pillReinvested">↺ '+esc(fmt(p.reinvested))+'</span>'
          +'<span class="payoutRate">'+r+'</span>'
          +'</div>'
          +'<button class="xBtn" data-del="'+origIdx+'" title="Remove">×</button>'
          +'</div>';
      }).join('')
    : '<p class="empty">No payouts logged yet.</p>';

  return '<section class="section">'
    +'<div class="sectionHead"><span class="sectionTitle">Payout log</span>'+badge+'</div>'
    +'<div class="card">'+form+'<div class="payoutList">'+listRows+'</div></div>'
    +'</section>';
}

function render(){
  document.getElementById('app').innerHTML = headerHtml() + portfolioHtml() + payoutHtml();
  if(editing){
    const inp = document.getElementById('kpi-'+editing);
    if(inp){ inp.focus(); inp.select(); }
  }
}

function commitEdit(inp){
  const field = inp.dataset.kpi; if(!field) return;
  const n = parseFloat(inp.value);
  state[field] = (isFinite(n) && n >= 0) ? n : (state[field] || 0);
  editing = null; save(); render();
}

document.addEventListener('click', e => {
  // Save open KPI edit when clicking outside it
  if(editing){
    const card = document.querySelector('.kpiCard.editing');
    if(card && !card.contains(e.target)){
      const inp = card.querySelector('.kpiInput');
      if(inp) commitEdit(inp);
      // fall through — might be clicking another card
    }
  }

  const act = e.target.closest('[data-act]');
  if(act){
    const a = act.getAttribute('data-act');
    if(a === 'theme'){
      currentTheme = act.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', currentTheme);
      try{ localStorage.setItem('patron_theme', currentTheme); }catch{}
      render(); return;
    }
    if(a === 'currency'){ state.currency = act.getAttribute('data-c'); save(); render(); return; }
  }

  const kpiCard = e.target.closest('.kpiCard');
  if(kpiCard){
    if(!e.target.closest('.kpiInput')){
      const field = kpiCard.getAttribute('data-field');
      if(field && editing !== field){ editing = field; render(); }
    }
    return;
  }

  if(e.target.id === 'logBtn'){
    const rec = parseFloat(document.getElementById('p-rec').value);
    const rei = parseFloat(document.getElementById('p-rei').value) || 0;
    if(!isFinite(rec) || rec <= 0){ alert('Enter the amount received.'); return; }
    state.payouts.push({ts: Date.now(), received: rec, reinvested: rei});
    save(); render(); return;
  }

  const del = e.target.closest('[data-del]');
  if(del){ state.payouts.splice(Number(del.getAttribute('data-del')), 1); save(); render(); return; }
});

document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && e.target.dataset.kpi){ commitEdit(e.target); e.preventDefault(); return; }
  if(e.key === 'Escape' && editing){ editing = null; render(); }
});

render();
</script>
</body>
</html>
